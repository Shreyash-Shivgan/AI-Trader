services:
  # 1. Web Service (API & Scanner & Bot)
  - type: web
    name: ai-trader-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: ai-trader-db
          property: connectionString
      - key: RUN_BOT_IN_APP
        value: "true"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: ENVIRONMENT
        value: production

# 2. PostgreSQL Database Instance
databases:
  - name: ai-trader-db
    plan: free
    databaseName: ai_trader
    user: ai_trader
